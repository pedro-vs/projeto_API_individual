spring.application.name=product-service
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_DB:store}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:store}
spring.datasource.password=${DATABASE_PASSWORD:store}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=products
spring.flyway.create-schemas=true
spring.flyway.schemas=products
spring.flyway.default-schema=products
spring.cache.type=${SPRING_CACHE_TYPE:simple}
spring.cache.cache-names=products,productById
spring.cache.redis.time-to-live=10m
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
