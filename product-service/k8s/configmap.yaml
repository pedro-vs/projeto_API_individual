apiVersion: v1
kind: ConfigMap
metadata:
  name: product-service-config
  namespace: store-platform
data:
  SPRING_APPLICATION_NAME: product-service
  SERVER_PORT: "8080"
  DATABASE_HOST: postgres
  DATABASE_PORT: "5432"
  DATABASE_DB: store
  DATABASE_USERNAME: store
  SPRING_CACHE_TYPE: redis
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  SPRING_JPA_OPEN_IN_VIEW: "false"
