spring.application.name=account-service
server.port=8083
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_DB:store}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:store}
spring.datasource.password=${DATABASE_PASSWORD:store}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=accounts
spring.flyway.create-schemas=true
spring.flyway.schemas=accounts
spring.flyway.default-schema=accounts
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
