services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: store
      POSTGRES_USER: store
      POSTGRES_PASSWORD: devpass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U store -d store"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  exchange-service:
    build:
      context: ./support/mock-exchange
    ports:
      - "8000:8000"

  product-service:
    build:
      context: ./product-service
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_DB: store
      DATABASE_USERNAME: store
      DATABASE_PASSWORD: devpass
      SPRING_CACHE_TYPE: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  order-service:
    build:
      context: ./order-service
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_DB: store
      DATABASE_USERNAME: store
      DATABASE_PASSWORD: devpass
      PRODUCT_SERVICE_URL: http://product-service:8080
      EXCHANGE_SERVICE_URL: http://exchange-service:8000
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
      product-service:
        condition: service_started
      exchange-service:
        condition: service_started

  prometheus:
    image: prom/prometheus:v3.0.1
    profiles:
      - observability
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - product-service
      - order-service

  grafana:
    image: grafana/grafana:11.3.1
    profiles:
      - observability
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres-data:
