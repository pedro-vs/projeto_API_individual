spring.application.name=auth-service
server.port=8084
clients.account-service.url=http://localhost:8083
spring.cloud.openfeign.client.config.default.connectTimeout=2000
spring.cloud.openfeign.client.config.default.readTimeout=2000
store.jwt.secret=${STORE_JWT_SECRET:c3RvcmUtcGxhdGZvcm0tand0LXNlY3JldC1mb3ItMjAyNi0wNS0xNA==}
store.jwt.duration=${STORE_JWT_DURATION:86400000}
store.jwt.http-only=${STORE_JWT_HTTP_ONLY:true}
store.jwt.secure=${STORE_JWT_SECURE:false}
store.jwt.same-site=${STORE_JWT_SAME_SITE:Lax}
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
