site_name: Projeto API Individual
site_description: Documentacao do projeto individual da disciplina Platforms, Microservices, DevOps and APIs.
site_author: Pedrohvs
repo_url: https://github.com/pedro-vs/projeto_API_individual
repo_name: pedro-vs/projeto_API_individual
site_url: https://pedro-vs.github.io/projeto_API_individual/

theme:
  name: material
  language: pt-BR
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: teal
      accent: amber

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Inicio: index.md
  - Projeto:
      - Entrega: entrega.md
      - Arquitetura: projeto/arquitetura.md
      - Execucao Local: projeto/execucao-local.md
      - Validacao: projeto/validacao.md
  - Exercicios:
      - Product API: exercicios/product-api.md
      - Order API: exercicios/order-api.md
      - Exchange API: exercicios/exchange-api.md
      - Jenkins: exercicios/jenkins.md
      - MiniKube: exercicios/minikube.md
      - Bottlenecks: exercicios/bottlenecks.md
