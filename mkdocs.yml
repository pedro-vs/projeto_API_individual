site_name: Entrega Individual - Pedro Sepulveda
site_description: Documentacao individual dos exercicios e do projeto de Platforms, Microservices, DevOps and APIs.
site_author: Pedro Henrique Vargas Sepulveda
repo_url: https://github.com/pedro-vs/projeto_API_individual
repo_name: pedro-vs/projeto_API_individual
site_url: https://pedro-vs.github.io/projeto_API_individual/

theme:
  name: material
  language: pt-BR
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: teal
      accent: amber

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Inicio: index.md
  - Entrega: entrega.md
  - Criterios: criterios.md
  - Rubrica: rubrica.md
  - Atividades: atividades.md
  - Product API:
      - Visao Geral: product.md
      - API e Testes: exercicios/product-api.md
      - Arquitetura: product/architecture.md
      - Desenvolvimento: product/development.md
  - Order API:
      - Visao Geral: order.md
      - API e Testes: exercicios/order-api.md
      - Arquitetura: order/architecture.md
      - Desenvolvimento: order/development.md
  - Projeto em Grupo:
      - Visao Geral: projeto.md
      - Arquitetura: projeto/arquitetura.md
      - Execucao Local: projeto/execucao-local.md
      - Validacao: projeto/validacao.md
      - AWS: projeto/aws.md
      - EKS: projeto/eks.md
      - CI/CD em EKS: projeto/ci-cd-eks.md
      - Load Testing: projeto/load-testing.md
      - Custos e PaaS: projeto/custos-paas.md
      - Apresentacao: projeto/apresentacao.md
      - Git Submodules: projeto/submodules.md
  - Atividades do Grupo:
      - Exchange API: exercicios/exchange-api.md
      - Jenkins: exercicios/jenkins.md
      - MiniKube: exercicios/minikube.md
      - Bottlenecks do Grupo: exercicios/bottlenecks.md
  - Bottlenecks: bottlenecks.md
  - Repositorios: repositorios.md
  - Uso de IA: uso-ia.md
  - Apresentacao: apresentacao.md
