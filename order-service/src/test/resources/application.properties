spring.datasource.url=jdbc:h2:mem:orderdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=orders
spring.flyway.create-schemas=true
spring.flyway.schemas=orders
spring.flyway.default-schema=orders
clients.product-service.url=http://localhost:8080
clients.exchange-service.url=http://localhost:8000
