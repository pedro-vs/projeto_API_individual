spring.application.name=order-service
server.port=8081
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_DB:store}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:store}
spring.datasource.password=${DATABASE_PASSWORD:store}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=orders
spring.flyway.create-schemas=true
spring.flyway.schemas=orders
spring.flyway.default-schema=orders
clients.product-service.url=${PRODUCT_SERVICE_URL:http://localhost:8080}
clients.exchange-service.url=${EXCHANGE_SERVICE_URL:http://localhost:8000}
spring.cloud.openfeign.client.config.default.connectTimeout=2000
spring.cloud.openfeign.client.config.default.readTimeout=2000
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
